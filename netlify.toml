[build]
  command = "pnpm run build"
  publish = "dist/public"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "24"
  NODE_ENV = "production"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mysql2"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
